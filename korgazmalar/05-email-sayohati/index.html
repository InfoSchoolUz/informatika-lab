<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Elektron Xat Sayohati</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;color:#e2e8f0;font-family:'Inter',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
canvas#bg{position:fixed;inset:0;z-index:0}
.ui{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;padding:12px 14px 8px}

.hdr{text-align:center;margin-bottom:10px}
.hdr-badge{font-size:8px;color:#ec489955;letter-spacing:4px}
.hdr h1{font-size:1.3rem;font-weight:800;color:#fff;text-shadow:0 0 24px #ec489944}
.hdr p{font-size:.75rem;color:#475569}

/* Compose bar */
.compose{display:flex;gap:8px;margin-bottom:10px}
.compose-fields{flex:1;display:flex;flex-direction:column;gap:5px}
.field-row{display:flex;align-items:center;gap:8px;background:rgba(20,5,25,.9);
  border:1.5px solid #3a1a4a;border-radius:10px;padding:0 12px}
.field-row:focus-within{border-color:#ec4899}
.field-lbl{font-size:.68rem;color:#ec4899;font-weight:700;letter-spacing:1px;min-width:36px}
.field-inp{flex:1;background:transparent;border:none;outline:none;color:#e2e8f0;
  font-family:'JetBrains Mono',monospace;font-size:.78rem;padding:7px 0}
#send-btn{padding:0 18px;background:rgba(236,72,153,.1);border:1.5px solid #ec489955;
  border-radius:10px;color:#ec4899;font-size:13px;cursor:pointer;font-weight:700;
  align-self:stretch;min-width:80px;transition:all .2s}
#send-btn:hover{background:rgba(236,72,153,.2)}
#send-btn.stop{background:rgba(26,6,6,.9);border-color:#ef444455;color:#ef4444}

/* Main grid */
.main{flex:1;display:grid;grid-template-columns:1.1fr 1fr;gap:10px;min-height:0}

/* Journey panel */
.journey-panel{background:rgba(8,5,18,.88);border:1px solid #2a1a3a;border-radius:14px;
  padding:12px;display:flex;flex-direction:column;overflow:hidden}
.panel-title{font-size:8px;letter-spacing:3px;margin-bottom:8px;font-weight:700}
.jp-title{color:#ec4899}
canvas#journey{flex:1;min-height:0}

/* Right */
.right{display:flex;flex-direction:column;gap:8px;min-height:0}

/* Steps */
.steps-panel{background:rgba(8,5,18,.88);border:1px solid #2a1a3a;border-radius:14px;padding:12px}
.sp-title{color:#f59e0b}
.step-list{display:flex;flex-direction:column;gap:5px}
.step-item{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:8px;
  border:1px solid #1a0a2a;opacity:.28;transition:all .4s}
.step-item.active{opacity:1;background:rgba(236,72,153,.07);border-color:#ec489933}
.step-item.done{opacity:.6;background:rgba(236,72,153,.04)}
.step-dot{width:22px;height:22px;border-radius:50%;border:1.5px solid #2a1a3a;
  display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all .4s}
.step-item.active .step-dot{border-color:#ec4899;box-shadow:0 0 10px rgba(236,72,153,.5);background:rgba(236,72,153,.1)}
.step-item.done .step-dot{border-color:#ec489966}
.step-txt{flex:1}
.step-name{font-size:.75rem;font-weight:700;color:#64748b;transition:color .3s}
.step-item.active .step-name{color:#f0abca}
.step-sub{font-size:.65rem;color:#1e3a5a;line-height:1.4}
.step-item.active .step-sub{color:#475569}
.step-bar{height:2px;background:#1a0a2a;border-radius:1px;margin-top:4px;overflow:hidden}
.step-fill{height:100%;background:linear-gradient(90deg,#ec4899,#f472b6);width:0;transition:width .9s ease}

/* Inbox */
.inbox-panel{background:rgba(8,5,18,.88);border:1px solid #2a1a3a;border-radius:14px;
  padding:12px;flex:1;display:flex;flex-direction:column;min-height:0}
.ip-title{color:#a78bfa}
.inbox-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:5px}
.inbox-empty{color:#1e3a5a;font-size:.75rem;text-align:center;padding:12px 0}
.inbox-msg{background:rgba(15,8,30,.7);border:1px solid #2a1a3a;border-radius:9px;
  padding:9px 12px;animation:slideIn .4s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.inbox-from{font-size:.68rem;color:#ec4899;font-family:'JetBrains Mono',monospace;margin-bottom:2px}
.inbox-subj{font-size:.8rem;font-weight:700;color:#e2e8f0;margin-bottom:3px}
.inbox-preview{font-size:.68rem;color:#64748b;line-height:1.4}
.inbox-meta{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap}
.meta-chip{background:rgba(167,139,250,.08);border:1px solid #a78bfa22;border-radius:4px;
  padding:1px 7px;font-size:.62rem;font-family:'JetBrains Mono',monospace;color:#a78bfa}

/* Protocol log */
.proto-panel{background:rgba(8,5,18,.88);border:1px solid #2a1a3a;border-radius:14px;padding:10px}
.pp-title{color:#06b6d4}
.proto-log{font-family:'JetBrains Mono',monospace;font-size:.65rem;display:flex;flex-direction:column;gap:3px;max-height:72px;overflow-y:auto}
.pl{padding:3px 7px;border-radius:5px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.pl-smtp{background:rgba(236,72,153,.07);border-left:2px solid #ec4899;color:#f9a8d4}
.pl-dns{background:rgba(168,85,250,.07);border-left:2px solid #a78bfa;color:#c4b5fd}
.pl-imap{background:rgba(6,182,212,.07);border-left:2px solid #06b6d4;color:#67e8f9}
.pl-ok{background:rgba(34,197,94,.07);border-left:2px solid #22c55e;color:#86efac}

/* Dots */
.dots{display:flex;justify-content:center;gap:6px;margin-top:6px}
.dot{width:7px;height:7px;border-radius:50%;background:#1a0a2a;transition:all .3s}
.dot.done{background:#ec4899}
.dot.cur{background:#ec489988;box-shadow:0 0 10px #ec4899}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="ui">
  <div class="hdr">
    <div class="hdr-badge">&#9679; 05-KO'RGAZMA &middot; 5-SINF</div>
    <h1>&#128140; Elektron Xat Sayohati</h1>
    <p>Xat yuborasiz &rarr; dunyoning narigi tomoniga &mdash; ichida nima bo&apos;ladi?</p>
  </div>

  <div class="compose">
    <div class="compose-fields">
      <div class="field-row">
        <span class="field-lbl">KIM GA</span>
        <input class="field-inp" id="to-inp" value="o'quvchi@maktab.uz" autocomplete="off"/>
      </div>
      <div class="field-row">
        <span class="field-lbl">MAVZU</span>
        <input class="field-inp" id="subj-inp" value="Bugungi dars haqida" autocomplete="off"/>
      </div>
    </div>
    <button id="send-btn">&#9654; YUBORISH</button>
  </div>

  <div class="main">
    <div class="journey-panel">
      <div class="panel-title jp-title">&#128140; XAT SAYOHATI &mdash; ANIMATSIYA</div>
      <canvas id="journey"></canvas>
    </div>
    <div class="right">
      <div class="steps-panel">
        <div class="panel-title sp-title">&#9889; PROTOKOLLAR KETMA-KETLIGI</div>
        <div class="step-list" id="step-list"></div>
      </div>
      <div class="inbox-panel">
        <div class="panel-title ip-title">&#128236; QABUL QUTISI (INBOX)</div>
        <div class="inbox-body" id="inbox-body">
          <div class="inbox-empty">Xatlar yo&apos;q &mdash; YUBORISH tugmasini bosing</div>
        </div>
      </div>
      <div class="proto-panel">
        <div class="panel-title pp-title">&#128225; PROTOKOL LOG</div>
        <div class="proto-log" id="proto-log"></div>
      </div>
    </div>
  </div>
  <div class="dots" id="dots"></div>
</div>

<script>
// ── Background ──────────────────────────────────────────────────────────────
var bgc=document.getElementById('bg');
var bx=bgc.getContext('2d');
var bPts=[];
function rBg(){bgc.width=innerWidth;bgc.height=innerHeight;}
rBg(); window.addEventListener('resize',rBg);
for(var i=0;i<55;i++) bPts.push({x:Math.random()*1400,y:Math.random()*900,vx:(Math.random()-.5)*.1,vy:(Math.random()-.5)*.1});
(function ab(){
  requestAnimationFrame(ab);
  bx.clearRect(0,0,bgc.width,bgc.height);
  bPts.forEach(function(p){
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=bgc.width;if(p.x>bgc.width)p.x=0;
    if(p.y<0)p.y=bgc.height;if(p.y>bgc.height)p.y=0;
  });
  for(var i=0;i<bPts.length;i++) for(var j=i+1;j<bPts.length;j++){
    var d=Math.hypot(bPts[i].x-bPts[j].x,bPts[i].y-bPts[j].y);
    if(d<110){bx.beginPath();bx.moveTo(bPts[i].x,bPts[i].y);bx.lineTo(bPts[j].x,bPts[j].y);
      bx.strokeStyle='rgba(236,72,153,'+(0.025*(1-d/110))+')';bx.stroke();}
  }
  bPts.forEach(function(p){bx.beginPath();bx.arc(p.x,p.y,1.2,0,Math.PI*2);bx.fillStyle='rgba(236,72,153,.12)';bx.fill();});
})();

// ── Journey canvas ──────────────────────────────────────────────────────────
var jc=document.getElementById('journey');
var jx=jc.getContext('2d');

var NDATA=[
  {lbl:'Siz',     sub:'Gmail / Outlook', emoji:'👤', col:'#ec4899', rgb:[236,72,153]},
  {lbl:'SMTP',    sub:'Yuborish serveri', emoji:'📤', col:'#f59e0b', rgb:[245,158,11]},
  {lbl:'DNS MX',  sub:'Pochta manzili',  emoji:'📖', col:'#a78bfa', rgb:[167,139,250]},
  {lbl:'Internet',sub:'Fiber / Kabel',   emoji:'🌐', col:'#06b6d4', rgb:[6,182,212]},
  {lbl:'IMAP',    sub:'Qabul serveri',   emoji:'📥', col:'#22c55e', rgb:[34,197,94]},
  {lbl:'Inbox',   sub:'Qabul qutisi',    emoji:'📬', col:'#10b981', rgb:[16,185,129]},
];

var jNodes=[];
var packets=[];
var activeNodes={};
var activeEdges={};

function initJourney(){
  var panel=jc.parentElement;
  jc.width=Math.max(panel.clientWidth-24,100);
  jc.height=Math.max(panel.clientHeight-36,100);
  var W=jc.width,H=jc.height;
  jNodes=NDATA.map(function(n,i){
    var t=i/(NDATA.length-1);
    var x=W*0.08+t*(W*0.84);
    var y=(i%2===0)?H*0.32:H*0.68;
    return {x:x,y:y,lbl:n.lbl,sub:n.sub,emoji:n.emoji,col:n.col,rgb:n.rgb,pulse:0};
  });
}

var lastT=performance.now();
(function loop(){
  requestAnimationFrame(loop);
  var now=performance.now();
  var dt=Math.min((now-lastT)/1000,0.1);
  lastT=now;
  packets=packets.filter(function(pk){pk.t+=dt*pk.speed;return pk.t<1.05;});
  drawJourney();
})();

function drawJourney(){
  if(!jNodes.length)return;
  jx.clearRect(0,0,jc.width,jc.height);

  // Edges
  for(var i=0;i<jNodes.length-1;i++){
    var a=jNodes[i],b=jNodes[i+1];
    var key=i+'-'+(i+1);
    var act=!!activeEdges[key];
    var mx=(a.x+b.x)/2,my=(a.y+b.y)/2+(i%2===0?28:-28);
    jx.beginPath();jx.moveTo(a.x,a.y);
    jx.quadraticCurveTo(mx,my,b.x,b.y);
    jx.strokeStyle=act?'rgba(236,72,153,.65)':'rgba(42,26,58,.5)';
    jx.lineWidth=act?2:1;
    jx.setLineDash(act?[]:[4,4]);jx.stroke();jx.setLineDash([]);
  }

  // Packets (envelope shape)
  packets.forEach(function(pk){
    if(!jNodes[pk.from]||!jNodes[pk.to])return;
    var a=jNodes[pk.from],b=jNodes[pk.to];
    var mx=(a.x+b.x)/2,my=(a.y+b.y)/2+(pk.from%2===0?28:-28);
    var tt=Math.min(pk.t,1);
    var qx=(1-tt)*(1-tt)*a.x+2*(1-tt)*tt*mx+tt*tt*b.x;
    var qy=(1-tt)*(1-tt)*a.y+2*(1-tt)*tt*my+tt*tt*b.y;
    // Envelope icon
    jx.save();
    jx.translate(qx,qy);
    jx.shadowBlur=16;jx.shadowColor=pk.col;
    jx.beginPath();
    jx.roundRect(-8,-6,16,12,3);
    jx.fillStyle='rgba('+pk.rgb[0]+','+pk.rgb[1]+','+pk.rgb[2]+',.25)';
    jx.strokeStyle=pk.col;jx.lineWidth=1.5;
    jx.fill();jx.stroke();
    // V line on envelope
    jx.beginPath();jx.moveTo(-8,-6);jx.lineTo(0,2);jx.lineTo(8,-6);
    jx.strokeStyle=pk.col;jx.lineWidth=1;jx.stroke();
    jx.shadowBlur=0;jx.restore();
    // Trail
    for(var tr=1;tr<=4;tr++){
      var tt2=Math.max(0,tt-tr*0.04);
      var tx=(1-tt2)*(1-tt2)*a.x+2*(1-tt2)*tt2*mx+tt2*tt2*b.x;
      var ty=(1-tt2)*(1-tt2)*a.y+2*(1-tt2)*tt2*my+tt2*tt2*b.y;
      jx.beginPath();jx.arc(tx,ty,3-tr*0.4,0,Math.PI*2);
      jx.fillStyle='rgba('+pk.rgb[0]+','+pk.rgb[1]+','+pk.rgb[2]+','+(0.2-tr*0.04)+')';
      jx.fill();
    }
  });

  // Nodes
  jNodes.forEach(function(n,i){
    var act=!!activeNodes[i];
    n.pulse=(n.pulse||0)+(act?0.07:0.02);
    var ps=Math.sin(n.pulse)*4;
    var rgb=n.rgb;
    if(act){
      jx.beginPath();jx.arc(n.x,n.y,28+ps,0,Math.PI*2);
      jx.fillStyle='rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+',.07)';jx.fill();
    }
    jx.beginPath();jx.arc(n.x,n.y,21,0,Math.PI*2);
    jx.fillStyle=act?'rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+',.18)':'rgba(12,5,22,.88)';
    jx.strokeStyle=act?n.col:'rgba(42,26,58,.5)';
    jx.lineWidth=act?2.5:1;jx.fill();jx.stroke();
    jx.font='13px serif';jx.textAlign='center';jx.textBaseline='middle';
    jx.fillStyle='#e2e8f0';jx.fillText(n.emoji,n.x,n.y);
    jx.font='bold 7.5px Inter';jx.fillStyle=act?n.col:'#475569';
    jx.fillText(n.lbl,n.x,n.y+29);
    jx.font='6.5px Inter';jx.fillStyle='#2a1a3a';
    jx.fillText(n.sub,n.x,n.y+39);
  });
}

function spawnPkt(from,to,rgb,speed){
  packets.push({from:from,to:to,col:'rgb('+rgb+')',rgb:rgb.split(',').map(Number),t:0,speed:speed||1.2});
}

// ── Steps data ─────────────────────────────────────────────────────────────
var STEPS=[
  {icon:'📝',name:'Xat yozildi',         sub:'Matn, mavzu, kimga — tayyor',           pFrom:-1,pTo:-1,rgb:null,
   pCls:'pl-smtp',pMsg:'From: o\'qituvchi@gmail.com To: o\'quvchi@maktab.uz'},
  {icon:'📤',name:'SMTP ulanish',         sub:'Yuborish serveri bilan bog\'lanish',     pFrom:0, pTo:1, rgb:'245,158,11',
   pCls:'pl-smtp',pMsg:'SMTP EHLO gmail.com => 250 OK'},
  {icon:'📖',name:'DNS MX qidiruv',       sub:'maktab.uz pochta serveri manzili',       pFrom:1, pTo:2, rgb:'167,139,250',
   pCls:'pl-dns', pMsg:'DNS MX maktab.uz => mail.maktab.uz [185.8.x.x]'},
  {icon:'🌐',name:'Internet orqali',      sub:'Xat paketlarga bo\'linib yuborildi',      pFrom:2, pTo:3, rgb:'6,182,212',
   pCls:'pl-smtp',pMsg:'DATA: 220 bytes encrypted TLS 1.3'},
  {icon:'📥',name:'IMAP server qabul',    sub:'Qabul serveri xatni saqladi',            pFrom:3, pTo:4, rgb:'34,197,94',
   pCls:'pl-imap',pMsg:'IMAP APPEND Inbox (\\Seen) => OK [APPENDUID]'},
  {icon:'📬',name:'Inbox da paydo',       sub:'O\'quvchi xatni ko\'rdi!',               pFrom:4, pTo:5, rgb:'16,185,129',
   pCls:'pl-ok',  pMsg:'Status: DELIVERED => 200 OK  Vaqt: 1.2 soniya!'},
];

// ── Steps UI ────────────────────────────────────────────────────────────────
var stepEls=[];
function buildStepsUI(){
  var list=document.getElementById('step-list');
  list.innerHTML='';stepEls=[];
  STEPS.forEach(function(s,i){
    var d=document.createElement('div');
    d.className='step-item';d.id='si'+i;
    d.innerHTML='<div class="step-dot">'+s.icon+'</div>'
      +'<div class="step-txt"><div class="step-name">'+s.name+'</div>'
      +'<div class="step-sub">'+s.sub+'</div>'
      +'<div class="step-bar"><div class="step-fill" id="sf'+i+'"></div></div></div>';
    list.appendChild(d);stepEls.push(d);
  });
}

function setStep(cur){
  STEPS.forEach(function(_,i){
    var el=document.getElementById('si'+i);
    el.className='step-item'+(i<cur?' done':i===cur?' active':'');
    document.getElementById('sf'+i).style.width=(i<cur?'100':i===cur?'100':'0')+'%';
  });
}

function buildDots(cur){
  var d=document.getElementById('dots');d.innerHTML='';
  for(var i=0;i<STEPS.length;i++){
    var dot=document.createElement('div');
    dot.className='dot'+(i<cur?' done':i===cur?' cur':'');
    d.appendChild(dot);
  }
}

// ── Proto log ───────────────────────────────────────────────────────────────
var protoLines=[];
function addProto(cls,msg){
  protoLines.push({cls:cls,msg:msg});
  var log=document.getElementById('proto-log');log.innerHTML='';
  protoLines.forEach(function(l){
    var d=document.createElement('div');d.className='pl '+l.cls;d.textContent=l.msg;log.appendChild(d);
  });
  log.scrollTop=log.scrollHeight;
}

// ── Inbox ───────────────────────────────────────────────────────────────────
function showInbox(to,subj){
  var body=document.getElementById('inbox-body');
  body.innerHTML='';
  var d=document.createElement('div');d.className='inbox-msg';
  d.innerHTML='<div class="inbox-from">&#128140; '+('o\'qituvchi@gmail.com')+'</div>'
    +'<div class="inbox-subj">'+subj+'</div>'
    +'<div class="inbox-preview">Assalomu alaykum! Bugungi darsga oid muhim ma\'lumotlar...</div>'
    +'<div class="inbox-meta">'
    +'<span class="meta-chip">&#128274; TLS 1.3</span>'
    +'<span class="meta-chip">SMTP/IMAP</span>'
    +'<span class="meta-chip">1.2 soniya</span>'
    +'<span class="meta-chip">&#10003; Yetkazildi</span>'
    +'</div>';
  body.appendChild(d);
}

// ── Main flow ───────────────────────────────────────────────────────────────
var running=false,timers=[];
function T(fn,ms){var id=setTimeout(fn,ms);timers.push(id);}
function clearAll(){timers.forEach(clearTimeout);timers=[];}

function startSend(){
  if(running){stopSend();return;}
  var to=document.getElementById('to-inp').value||'o\'quvchi@maktab.uz';
  var subj=document.getElementById('subj-inp').value||'Dars haqida';
  running=true;
  document.getElementById('send-btn').textContent='STOP';
  document.getElementById('send-btn').className='stop';
  activeNodes={};activeEdges={};packets=[];protoLines=[];
  document.getElementById('proto-log').innerHTML='';
  document.getElementById('inbox-body').innerHTML='<div class="inbox-empty">Kutilmoqda...</div>';
  buildStepsUI();buildDots(-1);

  STEPS.forEach(function(step,i){
    T(function(s,idx){return function(){
      // Activate node
      if(s.pFrom>=0) activeNodes[s.pFrom]=true;
      activeNodes[idx]=true;
      if(s.pFrom>=0&&s.pTo>=0){
        activeEdges[s.pFrom+'-'+s.pTo]=true;
        if(s.rgb) spawnPkt(s.pFrom,s.pTo,s.rgb,1.25);
      }
      setStep(idx);
      buildDots(idx);
      addProto(s.pCls,s.pMsg);
      if(idx===STEPS.length-1){
        T(function(){
          showInbox(to,subj);
          running=false;
          document.getElementById('send-btn').textContent='\u25BA YUBORISH';
          document.getElementById('send-btn').className='';
          buildDots(STEPS.length);
        },700);
      }
    };}(step,i), i*1000);
  });
}

function stopSend(){
  clearAll();running=false;
  activeNodes={};activeEdges={};packets=[];protoLines=[];
  document.getElementById('send-btn').textContent='\u25BA YUBORISH';
  document.getElementById('send-btn').className='';
  document.getElementById('proto-log').innerHTML='';
  document.getElementById('inbox-body').innerHTML='<div class="inbox-empty">Xatlar yo\'q &mdash; YUBORISH tugmasini bosing</div>';
  buildStepsUI();buildDots(-1);
}

document.getElementById('send-btn').addEventListener('click',function(){
  if(running)stopSend();else startSend();
});

window.addEventListener('resize',function(){setTimeout(initJourney,80);});
setTimeout(function(){initJourney();buildStepsUI();},80);
</script>
</body>
</html>
